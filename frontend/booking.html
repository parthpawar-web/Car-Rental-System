<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book This Car - DriveNow</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="nav-brand" onclick="window.location.href='index.html'">
            <svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.85 7h10.29l1.08 3.11H5.77L6.85 7zM7.5 17c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm9 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            DriveNow
        </div>
        <div id="navLinks">
            <a href="index.html">Home</a>
            <a href="cars.html">Cars</a>
            <a href="bookings.html">My Bookings</a>
        </div>
        <div>
            <button id="logoutBtn" class="btn btn-primary" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container detail-layout">
        <!-- Let's load car details here dynamically in JS, but for now we put a placeholder -->
        <div class="main-info" id="carDetailContainer">
            <h2 style="margin-bottom: 2rem;">Loading Vehicle Details...</h2>
        </div>

        <aside>
            <div class="booking-form-card">
                <h3>Book This Car</h3>
                <form id="bookingForm">
                    <div class="form-group">
                        <label>Pick-up Location</label>
                        <div class="search-input-wrapper" style="border: 1px solid var(--border-light); padding: 0.5rem 0.75rem; border-radius: 8px;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                            <input type="text" placeholder="Enter city" required style="border: none; padding: 0; outline: none; width: 100%;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Pick-up Date</label>
                        <input type="date" id="startDate" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Return Date</label>
                        <input type="date" id="endDate" required>
                    </div>

                    <div class="booking-price-total">
                        <span>Price per day</span>
                        <strong id="priceDisplay">...</strong>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Book Now</button>
                </form>
            </div>
        </aside>
    </div>

    <script src="js/script.js"></script>
    <script>
        checkAuth();
        const carId = new URLSearchParams(window.location.search).get('carId');
        document.getElementById('bookingForm').onsubmit = (e) => createBooking(e, carId);
        
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('startDate').min = today;
        document.getElementById('endDate').min = today;
        
        document.getElementById('startDate').addEventListener('change', function() {
            document.getElementById('endDate').min = this.value;
        });

        // Fetch single car detail function to populate left column
        async function loadSingleCar() {
            const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:') ? 'http://localhost:4000/api' : 'https://car-rental-api.onrender.com/api';
            try {
                const res = await fetch(`${API_URL}/cars`);
                const data = await res.json();
                const car = data.Data.find(c => c._id === carId);
                if (car) {
                    document.getElementById('carDetailContainer').innerHTML = `
                        <div class="detail-img-card">
                            <div class="car-badge" style="position:relative; display:inline-block; margin-bottom: 1rem; top:0; right:0; transform: scale(1.1); transform-origin: left;">${car.brand}</div>
                            ${car.image ? `<img src="${API_URL.replace('/api', '')}/${car.image}" alt="${car.name}">` : '<img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2?w=800" alt="Car">'}
                        </div>
                        <div style="margin-top: 2rem;">
                            <div class="detail-header">
                                <div>
                                    <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--text-dark); letter-spacing:-0.5px;">${car.brand} ${car.name}</h1>
                                    <div class="car-card-rating" style="font-size: 1rem; margin-bottom: 1.5rem;">
                                        <svg viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>
                                        4.9 (128 reviews)
                                    </div>
                                    
                                    <div style="display:flex; gap:1.5rem; margin-bottom: 2rem;">
                                        <div style="background:#f8fafc; padding:1rem 1.5rem; border-radius:12px; border:1px solid #e2e8f0; display:flex; flex-direction:column; gap:0.25rem;">
                                            <span style="font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Seats</span>
                                            <strong style="color:var(--primary); font-size:1.2rem;">${car.seats || 5}</strong>
                                        </div>
                                        <div style="background:#f8fafc; padding:1rem 1.5rem; border-radius:12px; border:1px solid #e2e8f0; display:flex; flex-direction:column; gap:0.25rem;">
                                            <span style="font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Transmission</span>
                                            <strong style="color:var(--primary); font-size:1.2rem;">${car.transmission || 'Auto'}</strong>
                                        </div>
                                        <div style="background:#f8fafc; padding:1rem 1.5rem; border-radius:12px; border:1px solid #e2e8f0; display:flex; flex-direction:column; gap:0.25rem;">
                                            <span style="font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; font-weight:700;">Fuel</span>
                                            <strong style="color:var(--primary); font-size:1.2rem;">${car.fuelType || 'Petrol'}</strong>
                                        </div>
                                    </div>
                                </div>
                                <div class="car-price" style="font-size: 2rem;">
                                    ₹${car.pricePerDay.toLocaleString('en-IN')}<span style="font-size:1rem; display:block; text-align:right;"> per day</span>
                                </div>
                            </div>
                            <h3 style="margin-bottom:1rem; font-size:1.25rem;">Description</h3>
                            <p class="detail-info">The <strong>${car.brand} ${car.name}</strong> combines spectacular luxury with unmatched capability. Designed for those who demand the very best, this vehicle offers a premium driving experience, featuring state-of-the-art technology, unparalleled comfort, and dynamic performance tailored for every journey.</p>
                        </div>
                    `;
                    document.getElementById('priceDisplay').textContent = `₹${car.pricePerDay.toLocaleString('en-IN')}`;
                }
            } catch (err) { console.error(err); }
        }
        loadSingleCar();
    </script>
</body>
</html>
